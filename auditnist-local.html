<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🔐 AuditNIST Local</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script> 
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            cyberbg: '#0f172a',
            cyberpanel: '#1e293b',
            cyberaccent: '#38bdf8',
            cyberevil: '#ef4444',
            cyberwarn: '#facc15',
            cyberok: '#22c55e'
          }
        }
      }
    }
  </script>

  <!-- Dependencias -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script> 
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> 
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script> 
</head>
<body class="bg-cyberbg text-gray-100 font-mono min-h-screen flex flex-col">

  <!-- Header -->
  <header class="container mx-auto p-4 flex justify-between items-center">
    <h1 class="text-3xl text-cyberaccent">🔐 AuditNIST Local</h1>
    <button onclick="clearData()" class="px-3 py-1 bg-cyberevil text-black rounded hover:bg-red-600">
      Limpiar datos
    </button>
  </header>

  <!-- Sugerir Controles -->
  <section class="container mx-auto mt-4 bg-cyberpanel p-4 rounded-lg shadow-lg">
    <div class="grid md:grid-cols-3 gap-4 items-end">
      <div>
        <label class="block font-bold text-cyberaccent">Función NIST</label>
        <select id="nist-function" class="w-full mt-1 p-2 rounded bg-gray-700 text-gray-100">
          <option>Identify</option>
          <option>Protect</option>
          <option>Detect</option>
          <option>Respond</option>
          <option>Recover</option>
        </select>
      </div>
      <div>
        <button id="suggest-controls"
                onclick="suggestControls()"
                class="px-4 py-2 bg-cyberok text-black rounded hover:bg-green-400">
          🔍 Sugerir controles
        </button>
      </div>
      <div>
        <span id="suggest-status" class="text-sm text-cyberwarn"></span>
      </div>
    </div>
    <div id="suggested-controls" class="mt-4 space-y-2"></div>
  </section>

  <!-- Main Form -->
  <main class="container mx-auto flex-1 mt-6 bg-cyberpanel p-6 rounded-lg shadow-lg">
    <!-- Metadatos -->
    <div class="grid md:grid-cols-2 gap-4">
      <div>
        <label class="block font-bold text-cyberaccent">Empresa auditada</label>
        <input id="empresa_auditada" type="text" placeholder="Nombre de la empresa"
               class="w-full mt-1 p-2 rounded bg-gray-700 text-gray-100"/>
      </div>
      <div>
        <label class="block font-bold text-cyberaccent">Empresa auditora</label>
        <input id="empresa_auditora" type="text" placeholder="Tu consultora o SOC"
               class="w-full mt-1 p-2 rounded bg-gray-700 text-gray-100"/>
      </div>
      <div>
        <label class="block font-bold text-cyberaccent">Auditor responsable</label>
        <input id="auditor" type="text" placeholder="Nombre y rol"
               class="w-full mt-1 p-2 rounded bg-gray-700 text-gray-100"/>
      </div>
      <div>
        <label class="block font-bold text-cyberaccent">Alcance de la auditoría</label>
        <input id="alcance" type="text" placeholder="Sistemas, red, aplicaciones, etc."
               class="w-full mt-1 p-2 rounded bg-gray-700 text-gray-100"/>
      </div>
      <div>
        <label class="block font-bold text-cyberaccent">ID del informe</label>
        <input id="id_informe" type="text" placeholder="Ej: INF-2025-001"
               class="w-full mt-1 p-2 rounded bg-gray-700 text-gray-100"/>
      </div>
      <div>
        <label class="block font-bold text-cyberaccent">Fecha de auditoría</label>
        <input id="fecha" type="date"
               class="w-full mt-1 p-2 rounded bg-gray-700 text-gray-100"/>
      </div>
    </div>

    <!-- Controles dinámicos -->
    <div id="controls" class="mt-6 space-y-4"></div>

    <!-- Botones principales -->
    <div class="mt-6 flex flex-wrap gap-4">
      <button onclick="addControl()"
              class="px-4 py-2 bg-cyberaccent text-black rounded hover:bg-blue-300">
        + Añadir Control
      </button>
      <button onclick="generatePDF()"
              class="px-4 py-2 bg-cyberok text-black rounded hover:bg-green-400">
        📄 Generar Informe PDF
      </button>
      <button onclick="exportToTXT()"
              class="px-4 py-2 bg-cyberaccent text-black rounded hover:bg-indigo-400">
        📄 Exportar como .txt
      </button>
    </div>

    <!-- Resumen numérico -->
    <div class="mt-8 grid md:grid-cols-2 gap-4">
      <div class="p-4 bg-cyberbg border-2 border-cyberaccent rounded text-center">
        <div id="countTotal" class="text-xl font-bold">Controles: 0</div>
      </div>
      <div class="p-4 bg-cyberbg border-2 border-cyberok rounded text-center">
        <div id="countOK" class="text-xl font-bold">Cumplidos ✅: 0</div>
      </div>
      <div class="p-4 bg-cyberbg border-2 border-cyberwarn rounded text-center">
        <div id="countFail" class="text-xl font-bold">No cumplidos ❌: 0</div>
      </div>
      <div class="p-4 bg-cyberbg border-2 border-cyberevil rounded text-center">
        <div id="countRisk" class="text-xl font-bold">Riesgos ALTO ⚠️: 0</div>
      </div>
    </div>

    <!-- Gráficos -->
    <div class="mt-8 grid md:grid-cols-2 gap-8">
      <div class="bg-gray-800 p-4 rounded border border-gray-700">
        <h2 class="text-cyberaccent mb-2 text-center">Cumplimiento</h2>
        <canvas id="chartCompliance"></canvas>
      </div>
      <div class="bg-gray-800 p-4 rounded border border-gray-700">
        <h2 class="text-cyberaccent mb-2 text-center">Niveles de Riesgo</h2>
        <canvas id="chartRisk"></canvas>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="container mx-auto p-4 text-center text-gray-500">
    © 2025 AuditNIST Local. All rights reserved.
  </footer>

  <!-- Script principal -->
  <script>
    const { jsPDF } = window.jspdf;

    // Datos predefinidos
    const PROBLEMS = [
      "Contraseñas débiles o compartidas",
      "Accesos sin control ni registros",
      "Ausencia de backups o no probados",
      "Actualizaciones pendientes",
      "Logs desactivados o ignorados",
      "Falta de formación",
      "Antivirus/firewall sin actualizar",
      "Uso inadecuado de herramientas ofensivas",
      "Usuarios inactivos",
      "Red mal segmentada",
      "Otro..."
    ];
    const SOLUTIONS = [
      "Aplicar política de contraseñas robustas y únicas",
      "Implementar control de acceso y registro de auditoría",
      "Establecer políticas de backup automatizado",
      "Mantener el software y sistemas actualizados",
      "Activar y revisar logs periódicamente",
      "Realizar formaciones de concienciación en ciberseguridad",
      "Actualizar o sustituir el antivirus/firewall",
      "Establecer reglas y control sobre el uso de herramientas ofensivas",
      "Auditar y eliminar usuarios inactivos regularmente",
      "Segregar la red por VLANs o zonas de confianza",
      "Otro..."
    ];

    // Función para conectarse a Ollama
    async function fetchLocal(prompt) {
      try {
        const res = await fetch('http://localhost:11434/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'llama3',
            prompt,
            stream: false
          })
        });

        if (!res.ok) throw new Error("Error en servidor local");
        const data = await res.json();
        return data.response.trim();

      } catch (e) {
        alert('⚠️ Error al conectarse con Ollama: ' + e.message);
        throw e;
      }
    }

    // Sugerir controles con Llama3 local
    async function suggestControls() {
      const btn = document.getElementById('suggest-controls');
      btn.disabled = true;
      document.getElementById('suggest-status').textContent = 'Generando...';

      try {
        const functionSelected = document.getElementById('nist-function').value;
        const prompt = `
Dame 5 controles NIST CSF (código + nombre) para la función "${functionSelected}".
Devuelve SOLO un array JSON válido:
[
  {"code": "PR.AC-1", "name": "Access Control Policy"},
  ...
]
NO añadas texto adicional.
`;

        const response = await fetchLocal(prompt);

        // Limpieza básica de respuesta
        let cleanResponse = response.replace(/^[^{[]+/i, '').trim();
        const match = cleanResponse.match(/\[[\s\S]*\]|\{[\s\S]*\}/);
        if (!match) throw new Error("JSON inválido en la respuesta");

        const list = JSON.parse(match[0]);

        document.getElementById('suggested-controls').innerHTML =
          list.map(c =>
            `<button onclick="addSuggestedControl('${c.code} – ${c.name}')"
                     class="px-3 py-1 bg-gray-600 text-white rounded">${c.code}</button>`
          ).join('');

      } catch (e) {
        alert('⚠️ Error al generar sugerencias: ' + e.message);
      } finally {
        document.getElementById('suggest-status').textContent = '';
        btn.disabled = false;
      }
    }

    function addSuggestedControl(text) {
      addControl();
      const ctrls = document.querySelectorAll('.ctrl');
      if (ctrls.length > 0) {
        ctrls[ctrls.length - 1].value = text;
        updateAll();
      }
    }

    // Auto-evidencia con IA local
    async function autoFillEvidence(btn) {
      const textarea = btn.nextElementSibling;
      const notes = textarea.value.trim();

      if (!notes) {
        alert('🛑 Escribe tus notas');
        return;
      }

      btn.disabled = true;
      try {
        const prompt = `A partir de estas notas: "${notes}", redacta un párrafo formal de evidencia.`;
        const response = await fetchLocal(prompt);
        textarea.value = response;
        updateAll();
      } catch (e) {
        alert('⚠️ Error al generar evidencia: ' + e.message);
      } finally {
        btn.disabled = false;
      }
    }

    // Charts
    let chartComp, chartRisk;
    function initCharts() {
      chartComp = new Chart(document.getElementById('chartCompliance').getContext('2d'), {
        type: 'doughnut',
        data: {
          labels: ['Sí', 'No', 'Parcial'],
          datasets: [{ data: [0, 0, 0], backgroundColor: ['#22c55e', '#ef4444', '#facc15'] }]
        }
      });
      chartRisk = new Chart(document.getElementById('chartRisk').getContext('2d'), {
        type: 'bar',
        data: {
          labels: ['Alto', 'Medio', 'Bajo'],
          datasets: [{
            label: 'Controles',
            data: [0, 0, 0],
            backgroundColor: ['#ef4444', '#facc15', '#22c55e']
          }]
        },
        options: {
          scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } },
          plugins: { legend: { display: false } }
        }
      });
    }

    // Añadir control manual
    function addControl() {
      const wrapper = document.createElement('div');
      wrapper.className = 'control bg-gray-800 p-4 rounded border border-gray-700 relative';
      const makeOpts = arr => arr.map(o => `<option value="${o}">${o}</option>`).join('');
      wrapper.innerHTML = `
        <button class="remove-btn absolute top-2 right-2 bg-cyberevil text-black px-2 py-1 rounded"
                onclick="this.parentNode.remove(); updateAll()">×</button>
        <label class="font-bold text-cyberaccent">Problemática detectada</label>
        <select class="problem mt-1 w-full bg-gray-700 text-gray-100 p-2 rounded"
                onchange="toggleOther(this)">
          <option value="">-- Seleccionar --</option>${makeOpts(PROBLEMS)}
        </select>
        <input class="problem-other mt-1 w-full p-2 rounded bg-gray-700 text-gray-100 hidden"
               placeholder="Describa la otra problemática"/>

        <label class="font-bold text-cyberaccent mt-4">Solución recomendada</label>
        <select class="solution mt-1 w-full bg-gray-700 text-gray-100 p-2 rounded"
                onchange="toggleOther(this)">
          <option value="">-- Seleccionar --</option>${makeOpts(SOLUTIONS)}
        </select>
        <input class="solution-other mt-1 w-full p-2 rounded bg-gray-700 text-gray-100 hidden"
               placeholder="Describa la otra solución"/>

        <label class="font-bold text-cyberaccent mt-4">Control</label>
        <input class="ctrl mt-1 w-full p-2 rounded bg-gray-700 text-gray-100"
               placeholder="PR.AC-1"/>

        <div class="grid grid-cols-2 gap-4 mt-4">
          <div>
            <label class="font-bold text-cyberaccent">Cumple</label>
            <select class="cumple mt-1 w-full bg-gray-700 text-gray-100 p-2 rounded"
                    onchange="updateAll()">
              <option value="">--</option><option>Sí</option><option>No</option><option>Parcial</option>
            </select>
          </div>
          <div>
            <label class="font-bold text-cyberaccent">Riesgo</label>
            <select class="riesgo mt-1 w-full bg-gray-700 text-gray-100 p-2 rounded"
                    onchange="updateAll()">
              <option value="">--</option><option>Alto</option><option>Medio</option><option>Bajo</option>
            </select>
          </div>
        </div>

        <label class="font-bold text-cyberaccent mt-4">Evidencia</label>
        <button onclick="autoFillEvidence(this)"
                class="mt-1 mb-2 px-2 py-1 bg-cyberwarn text-black rounded">
          ✍️ IA Evidencia
        </button>
        <textarea class="evidencia mt-1 w-full p-2 rounded bg-gray-700 text-gray-100"
                  rows="3" placeholder="Describe la evidencia"></textarea>
      `;
      document.getElementById('controls').appendChild(wrapper);
      updateAll();
    }

    function toggleOther(sel) {
      sel.nextElementSibling.classList.toggle('hidden', sel.value !== 'Otro...');
      updateAll();
    }

    function updateSummary() {
      const cnt = document.querySelectorAll('.control').length;
      const ok = [...document.querySelectorAll('.cumple')].filter(c => c.value === 'Sí').length;
      const no = [...document.querySelectorAll('.cumple')].filter(c => c.value === 'No').length;
      const alto = [...document.querySelectorAll('.riesgo')].filter(r => r.value === 'Alto').length;

      document.getElementById('countTotal').textContent = `Controles: ${cnt}`;
      document.getElementById('countOK').textContent = `Cumplidos ✅: ${ok}`;
      document.getElementById('countFail').textContent = `No cumplidos ❌: ${no}`;
      document.getElementById('countRisk').textContent = `Riesgos ALTO ⚠️: ${alto}`;
    }

    function updateCharts() {
      if (!chartComp || !chartRisk) return;

      const ok = [...document.querySelectorAll('.cumple')].filter(c => c.value === 'Sí').length;
      const no = [...document.querySelectorAll('.cumple')].filter(c => c.value === 'No').length;
      const pa = [...document.querySelectorAll('.cumple')].filter(c => c.value === 'Parcial').length;
      chartComp.data.datasets[0].data = [ok, no, pa];
      chartComp.update();

      const alto = [...document.querySelectorAll('.riesgo')].filter(r => r.value === 'Alto').length;
      const med = [...document.querySelectorAll('.riesgo')].filter(r => r.value === 'Medio').length;
      const baj = [...document.querySelectorAll('.riesgo')].filter(r => r.value === 'Bajo').length;
      chartRisk.data.datasets[0].data = [alto, med, baj];
      chartRisk.update();
    }

    function updateAll() {
      updateSummary();
      updateCharts();
    }

    function clearData() {
      ['empresa_auditada','empresa_auditora','auditor','alcance','id_informe','fecha']
        .forEach(id => document.getElementById(id).value = '');
      const ctrls = document.getElementById('controls');
      while (ctrls.firstChild) ctrls.removeChild(ctrls.firstChild);
      updateAll();
      addControl();
    }

    // --- Guardar progreso ---
    function saveProgress() {
      const data = {
        empresa: document.getElementById('empresa_auditada').value,
        auditora: document.getElementById('empresa_auditora').value,
        auditor: document.getElementById('auditor').value,
        alcance: document.getElementById('alcance').value,
        id: document.getElementById('id_informe').value || 'sinID',
        fecha: document.getElementById('fecha').value || new Date().toLocaleDateString(),
        controls: []
      };

      document.querySelectorAll('.control').forEach(blk => {
        const controlData = {
          problem: blk.querySelector('.problem').value,
          problemOther: blk.querySelector('.problem-other').value,
          solution: blk.querySelector('.solution').value,
          solutionOther: blk.querySelector('.solution-other').value,
          ctrl: blk.querySelector('.ctrl').value,
          cumple: blk.querySelector('.cumple').value,
          riesgo: blk.querySelector('.riesgo').value,
          evidencia: blk.querySelector('.evidencia').value
        };
        data.controls.push(controlData);
      });

      localStorage.setItem(`auditnist_${data.id}`, JSON.stringify(data));
      alert("✅ Informe guardado localmente.");
    }

    function loadProgress(id = 'ultimo') {
      const key = id === 'ultimo' ? getLatestReportKey() : `auditnist_${id}`;
      const saved = localStorage.getItem(key);

      if (!saved) {
        alert("⚠️ No se encontró ningún informe guardado.");
        return;
      }

      const data = JSON.parse(saved);
      document.getElementById('empresa_auditada').value = data.empresa;
      document.getElementById('empresa_auditora').value = data.auditora;
      document.getElementById('auditor').value = data.auditor;
      document.getElementById('alcance').value = data.alcance;
      document.getElementById('id_informe').value = data.id;
      document.getElementById('fecha').value = data.fecha;

      const ctrlsContainer = document.getElementById('controls');
      while (ctrlsContainer.firstChild) ctrlsContainer.removeChild(ctrlsContainer.firstChild);

      data.controls.forEach(c => {
        addControl();
        const wrapper = document.querySelectorAll('.control')[document.querySelectorAll('.control').length - 1];

        wrapper.querySelector('.problem').value = c.problem;
        wrapper.querySelector('.problem-other').value = c.problemOther;
        wrapper.querySelector('.problem-other').classList.toggle('hidden', c.problem !== 'Otro...');

        wrapper.querySelector('.solution').value = c.solution;
        wrapper.querySelector('.solution-other').value = c.solutionOther;
        wrapper.querySelector('.solution-other').classList.toggle('hidden', c.solution !== 'Otro...');

        wrapper.querySelector('.ctrl').value = c.ctrl;
        wrapper.querySelector('.cumple').value = c.cumple;
        wrapper.querySelector('.riesgo').value = c.riesgo;
        wrapper.querySelector('.evidencia').value = c.evidencia;
      });

      updateAll();
    }

    function getLatestReportKey() {
      const keys = Object.keys(localStorage).filter(k => k.startsWith('auditnist_'));
      return keys.sort((a, b) => b.localeCompare(a))[0] || null;
    }

    function listSavedReports() {
      const container = document.getElementById('saved-reports');
      const keys = Object.keys(localStorage)
        .filter(k => k.startsWith('auditnist_'))
        .map(k => k.replace('auditnist_', ''));

      if (keys.length === 0) {
        container.innerHTML = '<em>No hay informes guardados aún.</em>';
        return;
      }

      container.innerHTML = keys.map(id =>
        `<button onclick="loadProgress('${id}')"
                 class="block px-3 py-1 bg-gray-600 text-white mb-2">${id}</button>`
      ).join('');
    }

    // --- Generar PDF ---
 function generatePDF() {
  try {
    const doc = new jsPDF({ unit: 'pt', format: 'a4' });
    const data = {
      empresa: document.getElementById('empresa_auditada').value,
      auditora: document.getElementById('empresa_auditora').value,
      auditor: document.getElementById('auditor').value,
      alcance: document.getElementById('alcance').value,
      id: document.getElementById('id_informe').value || 'sinID',
      fecha: document.getElementById('fecha').value || new Date().toLocaleDateString()
    };

    if (!data.empresa || !data.auditora) {
      alert('🛑 Debes completar Empresa auditada y Auditora antes de generar el PDF.');
      return;
    }

    // Portada
    const pageWidth = doc.internal.pageSize.getWidth();
    doc.setFillColor(15, 23, 42); // Fondo oscuro
    doc.rect(0, 0, pageWidth, 100, 'F'); // Rectángulo de portada
    doc.setTextColor(56, 189, 248); // Texto claro
    doc.setFontSize(18).setFont(undefined, 'bold');
    doc.text('Informe de Auditoría NIST CSF', 40, 100);

    // Metadatos
    doc.setFontSize(11).setTextColor(0,0,0); // Texto blanco
    ['ID Informe','Empresa auditada','Empresa auditora','Auditor','Alcance','Fecha']
      .forEach((label, i) => doc.text(`${label}: ${Object.values(data)[i]}`, 40, 120 + i * 14));

    let y = 120 + 6 * 14 + 20;

    // Controles
    doc.setFont(undefined, 'bold').setFontSize(14);
    doc.text("Controles Auditados", 40, y);
    y += 20;

    doc.setFont(undefined, 'normal').setFontSize(11);
    document.querySelectorAll('.control').forEach((blk, i) => {
      let p = blk.querySelector('.problem').value;
      if (p === 'Otro...') p = blk.querySelector('.problem-other').value;

      let s = blk.querySelector('.solution').value;
      if (s === 'Otro...') s = blk.querySelector('.solution-other').value;

      const ctrl = blk.querySelector('.ctrl').value;
      const cumple = blk.querySelector('.cumple').value || 'No especificado';
      const riesgo = blk.querySelector('.riesgo').value || 'No especificado';
      const ev = blk.querySelector('.evidencia').value || '(Sin evidencia)';
      
      if (y > 750) { doc.addPage(); y = 50; }

      doc.setFont(undefined, 'bold').setFontSize(12);
      doc.text(`CONTROL ${i+1}: ${ctrl}`, 40, y);
      y += 14;
      doc.setFont(undefined, 'normal');
      doc.text(`• Problemática: ${p}`, 60, y); y += 12;
      doc.text(`• Solución: ${s}`, 60, y); y += 12;
      doc.text(`• Cumple: ${cumple}`, 60, y); y += 12;
      doc.text(`• Riesgo: ${riesgo}`, 60, y); y += 12;
      doc.text(`• Evidencia:`, 60, y); y += 10;
      const lines = doc.splitTextToSize(ev, 480);
      doc.text(lines, 70, y);
      y += lines.length * 12 + 20;
    });

    // Guardar
    doc.save(`AuditNIST_Informe_${data.id}.pdf`);

  } catch (e) {
    console.error("Error al generar PDF:", e.message);
    alert("⚠️ Error al generar PDF: " + e.message);
  }
}

    // --- Exportar como TXT ---
    function exportToTXT() {
      const data = {
        empresa: document.getElementById('empresa_auditada').value,
        auditora: document.getElementById('empresa_auditora').value,
        auditor: document.getElementById('auditor').value,
        alcance: document.getElementById('alcance').value,
        id: document.getElementById('id_informe').value || 'sinID',
        fecha: document.getElementById('fecha').value || new Date().toLocaleDateString(),
      };

      let txt = `Informe de Auditoría NIST CSF\n`;
      txt += `===========================\n\n`;

      txt += `ID del informe: ${data.id}\n`;
      txt += `Empresa auditada: ${data.empresa}\n`;
      txt += `Empresa auditora: ${data.auditora}\n`;
      txt += `Auditor: ${data.auditor}\n`;
      txt += `Alcance: ${data.alcance}\n`;
      txt += `Fecha: ${data.fecha}\n\n`;

      txt += `Controles Auditados:\n`;
      document.querySelectorAll('.control').forEach((blk, i) => {
        let p = blk.querySelector('.problem').value;
        if (p === 'Otro...') p = blk.querySelector('.problem-other').value;

        let s = blk.querySelector('.solution').value;
        if (s === 'Otro...') s = blk.querySelector('.solution-other').value;

        const ctrl = blk.querySelector('.ctrl').value;
        const cumple = blk.querySelector('.cumple').value || 'No especificado';
        const riesgo = blk.querySelector('.riesgo').value || 'No especificado';
        const ev = blk.querySelector('.evidencia').value;

        txt += `\nControl: ${ctrl}\n`;
        txt += `• Problemática: ${p}\n`;
        txt += `• Solución: ${s}\n`;
        txt += `• Cumple: ${cumple}\n`;
        txt += `• Riesgo: ${riesgo}\n`;
        txt += `• Evidencia: ${ev}\n`;
      });

      const blob = new Blob([txt], { type: 'text/plain;charset=utf-8' });
      saveAs(blob, `AuditNIST_Informe_${data.id}.txt`);
    }

    // --- Inicialización ---
    window.onload = () => {
      initCharts();
      addControl();
    };
  </script>

  <!-- Botones adicionales -->
  <div class="container mx-auto mt-6">
    <div class="flex flex-wrap gap-4">
      <button onclick="saveProgress()" class="px-4 py-2 bg-cyberwarn text-black rounded hover:bg-yellow-500">
        💾 Guardar Progreso
      </button>
      <button onclick="listSavedReports()" class="px-4 py-2 bg-cyberaccent text-black rounded hover:bg-blue-400">
        📋 Ver Informes Guardados
      </button>
      <button onclick="exportToTXT()" class="px-4 py-2 bg-cyberok text-black rounded hover:bg-green-400">
        📄 Exportar como .txt
      </button>
    </div>
    <div id="saved-reports" class="mt-4 space-y-2"></div>
  </div>
</body>
</html>
